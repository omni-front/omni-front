<svg xmlns="http://www.w3.org/2000/svg" width="800" height="4" viewBox="0 0 800 4">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0">
        <animate attributeName="stop-opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:0.6">
        <animate attributeName="stop-opacity" values="0.6;0;0.6" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#d2a8ff;stop-opacity:0">
        <animate attributeName="stop-opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <line x1="0" y1="2" x2="800" y2="2" stroke="url(#g)" stroke-width="1"/>
</svg>
