<svg xmlns="http://www.w3.org/2000/svg" width="900" height="4" viewBox="0 0 900 4">
  <defs>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0">
        <animate attributeName="stop-opacity" values="0;0.5;0" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:0.5">
        <animate attributeName="stop-opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0">
        <animate attributeName="stop-opacity" values="0;0.5;0" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <line x1="0" y1="2" x2="900" y2="2" stroke="url(#dg)" stroke-width="1"/>
</svg>
