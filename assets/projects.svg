<svg fill="none" viewBox="0 0 900 320" width="900" height="320" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .grid {
          width: 900px;
          height: 320px;
          display: grid;
          grid-template-columns: 1fr 1fr 1fr;
          gap: 12px;
          padding: 8px;
          font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .project {
          background: #0a0a0f;
          border: 1px solid rgba(63,63,70,0.2);
          border-radius: 10px;
          padding: 24px 20px;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          position: relative;
          overflow: hidden;
          transition: border-color 0.3s;
        }

        .project::before {
          content: '';
          position: absolute;
          top: 0; left: 0; right: 0;
          height: 2px;
          border-radius: 10px 10px 0 0;
          opacity: 0;
          animation: cardReveal 8s ease-in-out infinite;
        }

        .project:nth-child(1)::before { background: linear-gradient(90deg, #3b82f6, #6366f1); animation-delay: 0s; }
        .project:nth-child(2)::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); animation-delay: -1.3s; }
        .project:nth-child(3)::before { background: linear-gradient(90deg, #06b6d4, #22d3ee); animation-delay: -2.6s; }
        .project:nth-child(4)::before { background: linear-gradient(90deg, #10b981, #34d399); animation-delay: -3.9s; }
        .project:nth-child(5)::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); animation-delay: -5.2s; }
        .project:nth-child(6)::before { background: linear-gradient(90deg, #ef4444, #f87171); animation-delay: -6.5s; }

        @keyframes cardReveal {
          0%, 100% { opacity: 0; }
          15%, 35% { opacity: 1; }
        }

        .project-name {
          font-size: 13px;
          font-weight: 600;
          color: #e4e4e7;
          letter-spacing: 0.5px;
          margin-bottom: 8px;
        }

        .project-desc {
          font-size: 11px;
          color: #71717a;
          line-height: 1.5;
          flex-grow: 1;
        }

        .project-tech {
          font-size: 9px;
          color: #52525b;
          letter-spacing: 1px;
          text-transform: uppercase;
          margin-top: 16px;
          padding-top: 12px;
          border-top: 1px solid rgba(63,63,70,0.15);
        }

        @media (prefers-color-scheme: light) {
          .project { background: #ffffff; border-color: rgba(228,228,231,0.6); }
          .project-name { color: #18181b; }
          .project-desc { color: #a1a1aa; }
          .project-tech { color: #a1a1aa; border-color: rgba(228,228,231,0.4); }
        }
      </style>
      <div class="grid">
        <div class="project">
          <div>
            <div class="project-name">Ad-Trafficking-Agent</div>
            <div class="project-desc">Autonomous ad operations using Vertex AI, Gmail API and Ad Manager</div>
          </div>
          <div class="project-tech">Python · Vertex AI · GCP</div>
        </div>
        <div class="project">
          <div>
            <div class="project-name">AI_Agent</div>
            <div class="project-desc">RAG-powered assistant with LangGraph, GPT-4o, MongoDB Atlas vector search</div>
          </div>
          <div class="project-tech">LangGraph · MongoDB · OpenAI</div>
        </div>
        <div class="project">
          <div>
            <div class="project-name">ConstructIQ</div>
            <div class="project-desc">Semantic search API for building permits with vector embeddings</div>
          </div>
          <div class="project-tech">FastAPI · Pinecone · Python</div>
        </div>
        <div class="project">
          <div>
            <div class="project-name">VoloHealthGPT</div>
            <div class="project-desc">AI psychological support chatbot using Llama 3.1 with RAG architecture</div>
          </div>
          <div class="project-tech">Llama 3.1 · RAG · Python</div>
        </div>
        <div class="project">
          <div>
            <div class="project-name">rag-from-scratch</div>
            <div class="project-desc">Building retrieval-augmented generation pipelines from zero</div>
          </div>
          <div class="project-tech">LlamaIndex · ChromaDB</div>
        </div>
        <div class="project">
          <div>
            <div class="project-name">langchain-master-class</div>
            <div class="project-desc">Chains, agents, tools, memory — comprehensive hands-on guide</div>
          </div>
          <div class="project-tech">LangChain · OpenAI · Jupyter</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
