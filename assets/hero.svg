<svg fill="none" viewBox="0 0 900 400" width="900" height="400" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .card {
          width: 900px;
          height: 400px;
          background: #0a0a0f;
          border-radius: 12px;
          overflow: hidden;
          position: relative;
          font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
          display: flex;
          align-items: center;
          justify-content: center;
          flex-direction: column;
        }

        /* Animated gradient mesh background */
        .mesh {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          opacity: 0.4;
          background:
            radial-gradient(ellipse 600px 300px at 20% 50%, rgba(59,130,246,0.15), transparent),
            radial-gradient(ellipse 500px 250px at 80% 30%, rgba(139,92,246,0.12), transparent),
            radial-gradient(ellipse 400px 200px at 60% 80%, rgba(6,182,212,0.10), transparent);
          animation: meshMove 12s ease-in-out infinite;
        }

        @keyframes meshMove {
          0%, 100% {
            background:
              radial-gradient(ellipse 600px 300px at 20% 50%, rgba(59,130,246,0.15), transparent),
              radial-gradient(ellipse 500px 250px at 80% 30%, rgba(139,92,246,0.12), transparent),
              radial-gradient(ellipse 400px 200px at 60% 80%, rgba(6,182,212,0.10), transparent);
          }
          33% {
            background:
              radial-gradient(ellipse 600px 300px at 40% 30%, rgba(59,130,246,0.18), transparent),
              radial-gradient(ellipse 500px 250px at 60% 70%, rgba(139,92,246,0.14), transparent),
              radial-gradient(ellipse 400px 200px at 20% 60%, rgba(6,182,212,0.12), transparent);
          }
          66% {
            background:
              radial-gradient(ellipse 600px 300px at 70% 60%, rgba(59,130,246,0.12), transparent),
              radial-gradient(ellipse 500px 250px at 30% 40%, rgba(139,92,246,0.16), transparent),
              radial-gradient(ellipse 400px 200px at 80% 30%, rgba(6,182,212,0.10), transparent);
          }
        }

        /* Floating particles */
        .particle {
          position: absolute;
          width: 2px;
          height: 2px;
          border-radius: 50%;
          background: rgba(255,255,255,0.3);
          animation: float 20s linear infinite;
        }

        .p1 { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 18s; }
        .p2 { left: 25%; top: 70%; animation-delay: -3s; animation-duration: 22s; }
        .p3 { left: 45%; top: 15%; animation-delay: -7s; animation-duration: 16s; }
        .p4 { left: 65%; top: 55%; animation-delay: -11s; animation-duration: 24s; }
        .p5 { left: 80%; top: 35%; animation-delay: -5s; animation-duration: 20s; }
        .p6 { left: 15%; top: 85%; animation-delay: -9s; animation-duration: 19s; }
        .p7 { left: 55%; top: 45%; animation-delay: -13s; animation-duration: 21s; }
        .p8 { left: 90%; top: 75%; animation-delay: -2s; animation-duration: 17s; }
        .p9 { left: 35%; top: 90%; animation-delay: -15s; animation-duration: 23s; }
        .p10 { left: 70%; top: 10%; animation-delay: -8s; animation-duration: 25s; }

        @keyframes float {
          0% { transform: translateY(0px) translateX(0px); opacity: 0; }
          10% { opacity: 0.4; }
          50% { opacity: 0.2; }
          90% { opacity: 0.4; }
          100% { transform: translateY(-400px) translateX(40px); opacity: 0; }
        }

        /* Thin horizontal lines */
        .line {
          position: absolute;
          height: 1px;
          background: linear-gradient(90deg, transparent, rgba(59,130,246,0.1), transparent);
          animation: linePulse 6s ease-in-out infinite;
        }
        .line1 { top: 30%; left: 0; right: 0; animation-delay: 0s; }
        .line2 { top: 70%; left: 0; right: 0; animation-delay: -2s; }

        @keyframes linePulse {
          0%, 100% { opacity: 0.3; }
          50% { opacity: 0.8; }
        }

        /* Content */
        .content {
          position: relative;
          z-index: 1;
          text-align: center;
        }

        .name {
          font-size: 42px;
          font-weight: 200;
          color: #e4e4e7;
          letter-spacing: 12px;
          text-transform: uppercase;
          margin-bottom: 16px;
        }

        .title {
          font-size: 13px;
          font-weight: 400;
          color: #71717a;
          letter-spacing: 6px;
          text-transform: uppercase;
          margin-bottom: 40px;
        }

        .tags {
          display: flex;
          gap: 24px;
          justify-content: center;
        }

        .tag {
          font-size: 11px;
          color: #52525b;
          letter-spacing: 2px;
          text-transform: uppercase;
          padding: 6px 16px;
          border: 1px solid rgba(63,63,70,0.3);
          border-radius: 100px;
        }

        /* Subtle border glow */
        .card::before {
          content: '';
          position: absolute;
          top: 0; left: 0; right: 0;
          height: 1px;
          background: linear-gradient(90deg, transparent, rgba(59,130,246,0.3), rgba(139,92,246,0.3), transparent);
          animation: borderGlow 4s ease-in-out infinite;
        }

        @keyframes borderGlow {
          0%, 100% { opacity: 0.5; }
          50% { opacity: 1; }
        }

        @media (prefers-color-scheme: light) {
          .card { background: #fafafa; }
          .name { color: #18181b; }
          .title { color: #a1a1aa; }
          .tag { color: #a1a1aa; border-color: rgba(228,228,231,0.8); }
          .particle { background: rgba(0,0,0,0.1); }
          .line { background: linear-gradient(90deg, transparent, rgba(59,130,246,0.05), transparent); }
          .card::before { background: linear-gradient(90deg, transparent, rgba(59,130,246,0.15), rgba(139,92,246,0.15), transparent); }
          .mesh { opacity: 0.2; }
        }
      </style>
      <div class="card">
        <div class="mesh"></div>
        <div class="line line1"></div>
        <div class="line line2"></div>
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="particle p8"></div>
        <div class="particle p9"></div>
        <div class="particle p10"></div>
        <div class="content">
          <div class="name">OMNI-FRONT</div>
          <div class="title">AI / ML Engineer</div>
          <div class="tags">
            <span class="tag">LLM Systems</span>
            <span class="tag">RAG Pipelines</span>
            <span class="tag">Voice AI</span>
            <span class="tag">Agents</span>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
