<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ef4444;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="250" fill="url(#bg)" rx="8"/>

  <!-- Animated wave lines -->
  <path d="M0,180 Q225,160 450,180 T900,180" fill="none" stroke="url(#accent)" stroke-width="1">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="M0,180 Q225,160 450,180 T900,180;
              M0,180 Q225,200 450,180 T900,180;
              M0,180 Q225,160 450,180 T900,180"/>
  </path>
  <path d="M0,195 Q300,180 600,195 T900,190" fill="none" stroke="url(#accent2)" stroke-width="0.8">
    <animate attributeName="d" dur="10s" repeatCount="indefinite"
      values="M0,195 Q300,180 600,195 T900,190;
              M0,190 Q300,210 600,190 T900,195;
              M0,195 Q300,180 600,195 T900,190"/>
  </path>
  <path d="M0,210 Q200,200 400,210 T900,205" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.4">
    <animate attributeName="d" dur="12s" repeatCount="indefinite"
      values="M0,210 Q200,200 400,210 T900,205;
              M0,205 Q200,215 400,205 T900,210;
              M0,210 Q200,200 400,210 T900,205"/>
  </path>

  <!-- Top border glow -->
  <rect x="0" y="0" width="900" height="1.5" rx="8" fill="url(#accent)" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Name -->
  <text x="450" y="85" text-anchor="middle" fill="#e4e4e7" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="32" font-weight="300" letter-spacing="10">OMNI-FRONT</text>

  <!-- Role -->
  <text x="450" y="120" text-anchor="middle" fill="#71717a" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="12" letter-spacing="5">AI / ML ENGINEER</text>

  <!-- Quote -->
  <text x="450" y="160" text-anchor="middle" fill="#52525b" font-family="Georgia,'Times New Roman',serif" font-size="11" font-style="italic">"The best way to predict the future is to invent it." — Alan Kay</text>
</svg>
