<svg xmlns="http://www.w3.org/2000/svg" width="900" height="50" viewBox="0 0 900 50">
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a24"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="50" fill="url(#sbg)" rx="6"/>

  <!-- Shimmer bar -->
  <rect x="-900" y="0" width="900" height="50" fill="url(#shimmer)" rx="6">
    <animate attributeName="x" values="-900;900" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Tech items -->
  <circle cx="70" cy="25" r="3" fill="#ef4444"/>
  <text x="82" y="29" fill="#71717a" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" letter-spacing="1">PYTHON</text>

  <circle cx="185" cy="25" r="3" fill="#f97316"/>
  <text x="197" y="29" fill="#71717a" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" letter-spacing="1">PYTORCH</text>

  <circle cx="310" cy="25" r="3" fill="#fbbf24"/>
  <text x="322" y="29" fill="#71717a" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" letter-spacing="1">LANGCHAIN</text>

  <circle cx="445" cy="25" r="3" fill="#ef4444"/>
  <text x="457" y="29" fill="#71717a" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" letter-spacing="1">FASTAPI</text>

  <circle cx="560" cy="25" r="3" fill="#f97316"/>
  <text x="572" y="29" fill="#71717a" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" letter-spacing="1">DOCKER</text>

  <circle cx="660" cy="25" r="3" fill="#fbbf24"/>
  <text x="672" y="29" fill="#71717a" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" letter-spacing="1">AWS</text>

  <circle cx="735" cy="25" r="3" fill="#ef4444"/>
  <text x="747" y="29" fill="#71717a" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" letter-spacing="1">GCP</text>

  <circle cx="810" cy="25" r="3" fill="#f97316"/>
  <text x="822" y="29" fill="#71717a" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="10" letter-spacing="1">SQL</text>
</svg>
