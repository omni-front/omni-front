<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="line2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d2a8ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#d2a8ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#d2a8ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" fill="url(#bg)" rx="6"/>

  <!-- Subtle animated wave lines -->
  <path d="M0,140 Q150,120 300,140 T600,140 T900,140" fill="none" stroke="url(#line1)" stroke-width="1">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="M0,140 Q150,120 300,140 T600,140 T900,140;
              M0,140 Q150,160 300,140 T600,140 T900,140;
              M0,140 Q150,120 300,140 T600,140 T900,140"/>
  </path>
  <path d="M0,150 Q200,130 400,150 T800,150" fill="none" stroke="url(#line2)" stroke-width="0.8">
    <animate attributeName="d" dur="10s" repeatCount="indefinite"
      values="M0,150 Q200,130 400,150 T800,150;
              M0,150 Q200,170 400,150 T800,150;
              M0,150 Q200,130 400,150 T800,150"/>
  </path>
  <path d="M0,160 Q250,145 500,160 T900,155" fill="none" stroke="url(#line1)" stroke-width="0.5" opacity="0.5">
    <animate attributeName="d" dur="12s" repeatCount="indefinite"
      values="M0,160 Q250,145 500,160 T900,155;
              M0,155 Q250,170 500,155 T900,160;
              M0,160 Q250,145 500,160 T900,155"/>
  </path>

  <!-- Name -->
  <text x="450" y="75" text-anchor="middle" fill="#c9d1d9" font-family="'SF Mono','Fira Code',monospace" font-size="28" font-weight="300" letter-spacing="8">OMNI-FRONT</text>

  <!-- Role -->
  <text x="450" y="108" text-anchor="middle" fill="#8b949e" font-family="'SF Mono','Fira Code',monospace" font-size="12" letter-spacing="4">AI / ML ENGINEER</text>

</svg>
